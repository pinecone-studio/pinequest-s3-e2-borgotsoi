mutation CreateQuestion(
  $examId: ID!
  $question: String!
  $answers: [String!]!
  $correctIndex: Int!
  $variation: String
  $attachmentKey: String
) {
  createQuestion(
    examId: $examId
    question: $question
    answers: $answers
    correctIndex: $correctIndex
    variation: $variation
    attachmentKey: $attachmentKey
  ) {
    id
  }
}
