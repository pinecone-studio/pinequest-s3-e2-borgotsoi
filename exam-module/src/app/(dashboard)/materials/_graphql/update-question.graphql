mutation UpdateQuestion(
  $id: ID!
  $question: String
  $answers: [String!]
  $correctIndex: Int
  $variation: String
  $attachmentKey: String
) {
  updateQuestion(
    id: $id
    question: $question
    answers: $answers
    correctIndex: $correctIndex
    variation: $variation
    attachmentKey: $attachmentKey
  ) {
    id
  }
}
