mutation CreateTeacher(
  $name: String!
  $lastName: String!
  $email: String!
  $subjects: [String]
  $role: UserRole
) {
  createTeacher(
    name: $name
    lastName: $lastName
    email: $email
    subjects: $subjects
    role: $role
  ) {
    id
    name
    lastName
    email
    role
    subjects
    classIds
    createdAt
  }
}
